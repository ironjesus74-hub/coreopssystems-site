# Watchtower config (pipe-delimited)
# name|url|expect|timeout
# expect:
#   - set to 200 for strict
#   - set to 0 to accept any 2xx/3xx

INTERVAL=60
RETRIES=1
QUIET_HOURS=0-0
FAIL_THRESHOLD=3
ALERT_COOLDOWN=900
SLOW_MS=1500

TARGET=Project Atlas|https://forge-atlas.io|200|8
TARGET=GitHub|https://github.com|0|8
