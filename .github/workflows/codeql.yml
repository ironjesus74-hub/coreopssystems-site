name: "CodeQL & CI Security Gate"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── CodeQL Security Analysis ─────────────────────────────────────────────
  analyze:
    name: CodeQL — ${{ matrix.language }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ── JavaScript Linting (ESLint) ───────────────────────────────────────────
  lint-js:
    name: Lint — JavaScript
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install --no-save eslint@9 globals@15

      - name: Run ESLint
        run: npx eslint --config eslint.config.mjs js/

  # ── HTML Validation (HTMLHint) ────────────────────────────────────────────
  lint-html:
    name: Lint — HTML
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install HTMLHint
        run: npm install --no-save htmlhint@1

      - name: Run HTMLHint
        run: |
          npx htmlhint \
            --rules 'doctype-first,title-require,tag-pair,attr-no-duplication,id-unique,src-not-empty,alt-require,spec-char-escape' \
            "*.html" "pages/*.html"

  # ── CDN Dependency Vulnerability Scan (Retire.js) ────────────────────────
  dependency-audit:
    name: Dependency Audit — Retire.js
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Retire.js
        run: npm install --no-save retire@5

      - name: Scan for vulnerable CDN libraries
        run: npx retire --path . --ignorefile .retireignore.json 2>/dev/null || npx retire --path .
