name: Health Report (Scheduled)

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (UTC)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Watchtower (best-effort)
        run: |
          set -e
          if [ -f docs/modules/watchtower/watchtower.sh ]; then
            cd docs/modules/watchtower
            bash ./watchtower.sh check || true
            bash ./watchtower.sh status || true
          else
            echo "watchtower not present; skipping"
          fi

      - name: Run Sentinel Pack (best-effort)
        run: |
          set -e
          if [ -f docs/modules/sentinel-pack/atlas_overseer.sh ]; then
            bash docs/modules/sentinel-pack/atlas_overseer.sh run || true
          else
            echo "sentinel-pack not present yet; skipping"
          fi

      - name: Upload health artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlas-health-${{ github.run_id }}
          path: |
            docs/report/**
            docs/modules/watchtower/*.log
            docs/modules/watchtower/*_state.tsv
            docs/modules/watchtower/*_alerts.tsv
          if-no-files-found: ignore
