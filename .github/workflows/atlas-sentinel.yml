name: Atlas Sentinel (Supervisor + Workers)

on:
  push:
    branches: [ "main" ]
    paths:
      - "docs/**"
      - ".github/workflows/atlas-sentinel.yml"
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: atlas-sentinel
  cancel-in-progress: false

jobs:
  sentinel:
    # Prevent infinite loops when the workflow commits its own report updates,
    # but still allow scheduled + manual runs.
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Sentinel Pack (Supervisor runs all workers)
        run: |
          set -euo pipefail
          chmod +x docs/modules/sentinel-pack/atlas_overseer.sh || true
          bash docs/modules/sentinel-pack/atlas_overseer.sh run

      - name: Commit report back into docs/report (publish to Pages)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/report || true

          if git diff --cached --quiet; then
            echo "No report changes."
            exit 0
          fi

          git commit -m "chore(report): update atlas health [skip ci]"
          git push
