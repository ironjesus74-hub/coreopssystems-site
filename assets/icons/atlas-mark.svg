<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Atlas Signal Core">
  <title>Atlas Signal Core</title>
  <defs>
    <!-- Apex burst gradient -->
    <radialGradient id="am-apex" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#c084ff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#c084ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Center atmosphere -->
    <radialGradient id="am-center" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="rgba(181,109,255,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Arm glow filter -->
    <filter id="am-arm-glow" x="-30%" y="-10%" width="160%" height="120%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Apex glow filter -->
    <filter id="am-apex-glow" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer precision ring -->
  <circle cx="100" cy="100" r="97" fill="none"
          stroke="rgba(103,217,255,0.18)" stroke-width="1"/>
  <!-- Dashed inner ring -->
  <circle cx="100" cy="100" r="84" fill="none"
          stroke="rgba(103,217,255,0.10)" stroke-width="0.8" stroke-dasharray="5 10"/>

  <!-- Center atmosphere fill -->
  <circle cx="100" cy="100" r="70" fill="url(#am-center)"/>

  <!-- ── LEFT SIGNAL ARM (coral/magenta) ── -->
  <!-- Soft halo first, then crisp edge -->
  <line x1="22" y1="180" x2="100" y2="22"
        stroke="rgba(255,107,138,0.22)" stroke-width="16" stroke-linecap="round"/>
  <polygon points="22,180 100,22 100,42 38,168"
           fill="rgba(255,111,141,0.07)"/>
  <line x1="22" y1="180" x2="100" y2="22"
        stroke="#ff6b8a" stroke-width="2.5" stroke-linecap="round"
        filter="url(#am-arm-glow)"/>

  <!-- ── RIGHT SIGNAL ARM (cyan) ── -->
  <line x1="178" y1="180" x2="100" y2="22"
        stroke="rgba(103,217,255,0.20)" stroke-width="16" stroke-linecap="round"/>
  <polygon points="178,180 100,22 100,42 162,168"
           fill="rgba(103,217,255,0.06)"/>
  <line x1="178" y1="180" x2="100" y2="22"
        stroke="#67d9ff" stroke-width="2.5" stroke-linecap="round"
        filter="url(#am-arm-glow)"/>

  <!-- ── CROSSBAR — violet collision zone ── -->
  <!-- Outer glow -->
  <line x1="40" y1="130" x2="160" y2="130"
        stroke="rgba(181,109,255,0.28)" stroke-width="10" stroke-linecap="round"/>
  <!-- Crisp bar -->
  <line x1="40" y1="130" x2="160" y2="130"
        stroke="#b56dff" stroke-width="2" stroke-linecap="round"/>
  <!-- End-caps (precision ticks) -->
  <line x1="40" y1="125" x2="40" y2="135"
        stroke="rgba(181,109,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="160" y1="125" x2="160" y2="135"
        stroke="rgba(181,109,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── APEX — collision burst ── -->
  <!-- Outer halo -->
  <circle cx="100" cy="22" r="18" fill="url(#am-apex)" opacity="0.75"/>
  <!-- Mid glow ring -->
  <circle cx="100" cy="22" r="10"
          fill="rgba(192,132,255,0.55)" filter="url(#am-apex-glow)"/>
  <!-- Core white point -->
  <circle cx="100" cy="22" r="4.5" fill="#ffffff"/>

  <!-- ── BASE SIGNAL SOURCES ── -->
  <!-- Left base (coral) -->
  <circle cx="22" cy="180" r="12" fill="rgba(255,107,138,0.12)"/>
  <circle cx="22" cy="180" r="5.5" fill="#ff6b8a" opacity="0.85"/>
  <!-- Right base (cyan) -->
  <circle cx="178" cy="180" r="12" fill="rgba(103,217,255,0.10)"/>
  <circle cx="178" cy="180" r="5.5" fill="#67d9ff" opacity="0.85"/>

  <!-- ── Precision tick marks on outer ring ── -->
  <line x1="100" y1="2" x2="100" y2="10"
        stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="190" x2="100" y2="198"
        stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2" y1="100" x2="10" y2="100"
        stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="190" y1="100" x2="198" y2="100"
        stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
