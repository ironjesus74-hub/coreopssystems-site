# Jekyll configuration — Atlas platform
# This site is deployed exclusively via Cloudflare Pages (git integration).
# GitHub Pages is NOT the deployment target. The .nojekyll file at repo root
# prevents accidental Jekyll processing if GitHub Pages is ever triggered.
# This config is a safety net only: if Jekyll is invoked for any reason,
# exclude all source files so it produces no output and exits cleanly.
exclude:
  - "js/"
  - "css/"
  - "pages/"
  - "functions/"
  - ".github/"
  - "*.jsonc"
  - "*.mjs"
  - "*.md"
  - "_headers"
  - "README.md"
  - "SECURITY.md"
  - "Atlas.md"
