<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Atlas Clash Mark — signal collision emblem -->
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#050d1a"/>
  <!-- Outer atmospheric ring -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#0d2040" stroke-width="1"/>
  <!-- Left signal — magenta/coral chevron pointing right -->
  <path d="M3 10.5 L13.5 16 L3 21.5" fill="none" stroke="#ff6f8d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right signal — electric cyan chevron pointing left -->
  <path d="M29 10.5 L18.5 16 L29 21.5" fill="none" stroke="#67d9ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center collision ring -->
  <circle cx="16" cy="16" r="4" fill="none" stroke="white" stroke-width="0.75" opacity="0.22"/>
  <!-- Center node inner glow -->
  <circle cx="16" cy="16" r="2.8" fill="white" opacity="0.18"/>
  <!-- Center collision node -->
  <circle cx="16" cy="16" r="2" fill="white"/>
</svg>
